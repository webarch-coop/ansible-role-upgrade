---
variables:
  ANSIBLE_ANY_ERRORS_FATAL: "1"
  ANSIBLE_CALLBACK_RESULT_FORMAT: "yaml"
  ANSIBLE_DEFAULT_VERBOSITY: "1"
  ANSIBLE_DIFF_ALWAYS: "1"
  ANSIBLE_DISPLAY_SKIPPED_HOSTS: "0"
  ANSIBLE_FORCE_COLOR: "1"
  ANSIBLE_INJECT_FACT_VARS: "0"
  ANSIBLE_NOCOWS: "1"
  ANSIBLE_REMOTE_TMP: "/tmp"
  ANSIBLE_ROLES_PATH: "${CI_PROJECT_DIR}/..:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles"
  ANSIBLE_SHELL_ALLOW_WORLD_READABLE_TEMP: "1"
  DEBIAN_FRONTEND: noninteractive
  MOLECULE_VERBOSITY: "1"
  PRE_COMMIT_COLOR: always
  PY_COLORS: "1"
before_script:
  - whoami
  - pwd
  - which pipx
  - pipx list
  - which jc
  - jc --version
  - which ansible
  - ansible --version
  - which yamllint
  - yamllint --version
  - which molecule
  - molecule --version
stages:
  # An older version of containers to test upgrades
  # https://git.coop/webarch/containers#docker-containers
  - 20260103_bookworm
  - 20260103_forky
  - 20260103_noble
  - 20260103_trixie
  # A recent version of the containers
  - 20260129_bookworm
  - 20260129_forky
  - 20260129_noble
  - 20260129_trixie
20260103_bookworm:
  image: registry.git.coop/webarch/containers/images/bookworm:20260103
  stage: 20260103_bookworm
  script:
    - molecule test
20260103_forky:
  image: registry.git.coop/webarch/containers/images/forky:20260103
  stage: 20260103_forky
  script:
    - pre-commit install
    - pre-commit run --all-files
    - molecule test
20260103_noble:
  image: registry.git.coop/webarch/containers/images/noble:20260103
  stage: 20260103_noble
  script:
    - molecule test
20260103_trixie:
  image: registry.git.coop/webarch/containers/images/trixie:20260103
  stage: 20260103_trixie
  script:
    - pre-commit install
    - pre-commit run --all-files
    - molecule test
20260129_bookworm:
  image: registry.git.coop/webarch/containers/images/bookworm:20260129
  stage: 20260129_bookworm
  script:
    - molecule test
20260129_forky:
  image: registry.git.coop/webarch/containers/images/forky:20260129
  stage: 20260129_forky
  script:
    - pre-commit install
    - pre-commit run --all-files
    - molecule test
20260129_noble:
  image: registry.git.coop/webarch/containers/images/noble:20260129
  stage: 20260129_noble
  script:
    - molecule test
20260129_trixie:
  image: registry.git.coop/webarch/containers/images/trixie:20260129
  stage: 20260129_trixie
  script:
    - pre-commit install
    - pre-commit run --all-files
    - molecule test
...
